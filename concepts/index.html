const RING_RADII = [0, 110, 210, 310, 410, 500, 590, 680];
const RING_LABELS = ["Pillars","Axioms","Features","Operators","Dynamics","Experience","Knowledge","Applied"];

// Pillar angular anchors (Thing=top, Relation=bottom-left, Situation=bottom-right)
const PILLAR_ANGLES = { thing: -Math.PI/2, relation: -Math.PI/2 + 2*Math.PI/3, situation: -Math.PI/2 + 4*Math.PI/3 };

// Assign which pillar each axiom is near
const AXIOM_PILLAR = { plurality:"thing", relationality:"relation", situationality:"situation", infinity:"situation" };

function familyOf(c) { return FAMILY_MAP[c.id] || "bridge"; }
function ringOf(c) { return RING_MAP[c.id] !== undefined ? RING_MAP[c.id] : 4; }
function familyColor(fam) { return FAMILY_COLORS[fam] || FAMILY_COLORS.bridge; }

// Count dependents for sizing
const depCount = {};
CONCEPTS.forEach(c => { depCount[c.id] = 0; });
CONCEPTS.forEach(c => { (c.presupposes||[]).forEach(p => { if(depCount[p]!==undefined) depCount[p]++; }); });

// Maturity config
const MAT_CFG = {
  formalized: {opacity:1, dash:"", glow:false},
  polished: {opacity:0.9, dash:"", glow:false},
  developed: {opacity:0.8, dash:"", glow:false},
  sketched: {opacity:0.7, dash:"4,3", glow:false},
  stub: {opacity:0.6, dash:"2,3", glow:false},
  proposed: {opacity:0.7, dash:"2,3", glow:true},
};

// Build concept lookup
const cMap = {}; CONCEPTS.forEach(c => { cMap[c.id] = c; });

// Layout: assign angular positions
function layoutConcepts() {
  const positions = {};
  const ringGroups = {};
  CONCEPTS.forEach(c => {
    const r = ringOf(c);
    if (!ringGroups[r]) ringGroups[r] = [];
    ringGroups[r].push(c);
  });

  // Ring 0: three pillars at fixed positions
  const pillars = ["thing","relation","situation"];
  pillars.forEach(pid => {
    positions[pid] = { x: Math.cos(PILLAR_ANGLES[pid]) * 60, y: Math.sin(PILLAR_ANGLES[pid]) * 60 };
  });

  // Ring 1: axioms near their pillar
  const axioms = ringGroups[1] || [];
  axioms.forEach(c => {
    const pillar = AXIOM_PILLAR[c.id] || "thing";
    const base = PILLAR_ANGLES[pillar];
    const idx = axioms.filter(a => AXIOM_PILLAR[a.id] === pillar).indexOf(c);
    const count = axioms.filter(a => AXIOM_PILLAR[a.id] === pillar).length;
    const spread = 0.4;
    const angle = base + (idx - (count-1)/2) * spread;
    positions[c.id] = { x: Math.cos(angle) * RING_RADII[1], y: Math.sin(angle) * RING_RADII[1] };
  });

  // Rings 2-7: distribute by family sector + even spacing
  for (let ring = 2; ring <= 7; ring++) {
    const group = ringGroups[ring] || [];
    if (!group.length) continue;
    const radius = RING_RADII[ring] || (ring * 90 + 60);

    // Sort by family to cluster, then spread evenly
    const familyOrder = ["thing","relation","situation","bridge"];
    group.sort((a,b) => {
      const fa = familyOrder.indexOf(familyOf(a)), fb = familyOrder.indexOf(familyOf(b));
      if (fa !== fb) return fa - fb;
      return a.name.localeCompare(b.name);
    });

    const n = group.length;
    group.forEach((c, i) => {
      const angle = -Math.PI/2 + (2 * Math.PI * i / n);
      // Add small jitter based on id hash for visual interest
      let hash = 0;
      for (let j = 0; j < c.id.length; j++) hash = ((hash << 5) - hash) + c.id.charCodeAt(j);
      const jitter = ((hash % 100) / 100 - 0.5) * 12;
      positions[c.id] = {
        x: Math.cos(angle) * (radius + jitter),
        y: Math.sin(angle) * (radius + jitter)
      };
    });
  }
  return positions;
}

// === RENDERING ===
const wrap = document.getElementById('graph-wrap');
const svg = document.getElementById('graph');
const tooltip = document.getElementById('tooltip');
const panel = document.getElementById('panel');
const panelContent = document.getElementById('panel-content');
const searchInput = document.getElementById('search-input');

let W, H, cx, cy;
let zoom = 1, panX = 0, panY = 0;
let selected = null;
let positions = {};
let searchTerm = "";
let filters = { ring: "", family: "", maturity: "", author: "" };

function resize() {
  W = wrap.clientWidth; H = wrap.clientHeight;
  cx = W/2; cy = H/2;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  render();
}

function nodeRadius(c) {
  if (ringOf(c) === 0) return 22;
  const deps = depCount[c.id] || 0;
  return Math.max(6, Math.min(18, 6 + deps * 1.2));
}

function isVisible(c) {
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    if (!c.name.toLowerCase().includes(s) && !c.id.includes(s) &&
        !(c.alt && c.alt.toLowerCase().includes(s))) return false;
  }
  if (filters.ring !== "" && ringOf(c) !== parseInt(filters.ring)) return false;
  if (filters.family && familyOf(c) !== filters.family) return false;
  if (filters.maturity && c.maturity !== filters.maturity) return false;
  if (filters.author) {
    const fa = filters.author.toLowerCase();
    const ca = (c.author||"").toLowerCase();
    if (fa === "collaborative") { if (!ca.includes("collaborative")) return false; }
    else { if (!ca.toLowerCase().includes(fa.toLowerCase())) return false; }
  }
  return true;
}

function screenX(wx) { return cx + (wx + panX) * zoom; }
function screenY(wy) { return cy + (wy + panY) * zoom; }

function render() {
  positions = layoutConcepts();
  let html = '';

  // Defs: gaussian blur for glow
  html += '<defs>';
  html += '<filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  html += '<filter id="glow-strong"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  html += '<radialGradient id="bg-grad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#121830"/><stop offset="100%" stop-color="#0a0e1a"/></radialGradient>';
  html += '</defs>';

  // Background
  html += `<rect x="0" y="0" width="${W}" height="${H}" fill="url(#bg-grad)"/>`;

  // Ring guides
  for (let i = 1; i <= 7; i++) {
    const r = RING_RADII[i] * zoom;
    html += `<circle cx="${screenX(0)}" cy="${screenY(0)}" r="${r}" fill="none" stroke="#2a3050" stroke-width="0.5" opacity="0.06"/>`;
  }

  // Determine selected ancestry/descendants
  let ancestors = new Set(), descendants = new Set(), chainEdges = new Set();
  if (selected) {
    // BFS ancestors
    const q = [selected];
    ancestors.add(selected);
    while (q.length) {
      const cur = q.shift();
      const c = cMap[cur];
      if (c) (c.presupposes||[]).forEach(p => { if (!ancestors.has(p)) { ancestors.add(p); q.push(p); } chainEdges.add(p+'->'+cur); });
    }
    // BFS descendants
    const q2 = [selected];
    descendants.add(selected);
    while (q2.length) {
      const cur = q2.shift();
      CONCEPTS.forEach(c => {
        if ((c.presupposes||[]).includes(cur) && !descendants.has(c.id)) {
          descendants.add(c.id); q2.push(c.id); chainEdges.add(cur+'->'+c.id);
        }
      });
    }
  }

  const chain = new Set([...ancestors, ...descendants]);

  // Edges
  CONCEPTS.forEach(c => {
    if (!positions[c.id]) return;
    (c.presupposes||[]).forEach(pid => {
      if (!positions[pid]) return;
      const src = positions[pid], tgt = positions[c.id];
      const sx = screenX(src.x), sy = screenY(src.y), tx = screenX(tgt.x), ty = screenY(tgt.y);
      const mx = (sx+tx)/2, my = (sy+ty)/2 - 20*zoom;
      const edgeKey = pid+'->'+c.id;
      const inChain = chainEdges.has(edgeKey);
      const srcFam = familyOf(cMap[pid]||c);
      const col = familyColor(srcFam).mid;
      let op = 0.12, sw = 0.6;
      if (selected) {
        if (inChain) { op = 0.6; sw = 1.8; } else { op = 0.03; }
      }
      if (!isVisible(c) && !isVisible(cMap[pid]||c)) op = 0.02;
      html += `<path d="M${sx},${sy} Q${mx},${my} ${tx},${ty}" fill="none" stroke="${col}" stroke-width="${sw*zoom}" opacity="${op}"/>`;
    });
  });

  // Nodes + labels
  CONCEPTS.forEach(c => {
    if (!positions[c.id]) return;
    const pos = positions[c.id];
    const x = screenX(pos.x), y = screenY(pos.y);
    const r = nodeRadius(c) * zoom;
    const fam = familyOf(c);
    const col = familyColor(fam);
    const mat = MAT_CFG[c.maturity] || MAT_CFG.developed;
    const vis = isVisible(c);
    const ring = ringOf(c);

    let nodeOp = mat.opacity;
    if (!vis) nodeOp = 0.08;
    if (selected) {
      if (chain.has(c.id)) nodeOp = mat.opacity;
      else nodeOp = 0.1;
    }

    const fillCol = ring === 0 ? col.bright : col.mid;
    const useGlow = ring === 0 || (mat.glow);
    const filterAttr = ring === 0 ? 'filter="url(#glow-strong)"' : (useGlow ? 'filter="url(#glow)"' : '');
    const dashAttr = mat.dash ? `stroke-dasharray="${mat.dash}"` : '';
    const pulseStyle = mat.glow ? 'animation: proposed-pulse 2s ease-in-out infinite;' : '';
    const pillarPulse = ring === 0 ? 'animation: pulse-glow 4s ease-in-out infinite;' : '';

    html += `<g class="node" data-id="${c.id}" style="cursor:pointer;${pulseStyle}${pillarPulse}" opacity="${nodeOp}">`;
    html += `<circle cx="${x}" cy="${y}" r="${r}" fill="${fillCol}" fill-opacity="0.15" stroke="${fillCol}" stroke-width="${ring===0?2:1.2}" ${dashAttr} ${filterAttr}/>`;
    html += `<circle cx="${x}" cy="${y}" r="${r*0.4}" fill="${fillCol}" fill-opacity="0.6"/>`;

    // Labels: always show for ring 0-2, or if 3+ dependents, or if zoomed enough
    const showLabel = ring <= 2 || (depCount[c.id]||0) >= 3 || zoom > 1.3;
    if (showLabel) {
      const angle = Math.atan2(pos.y, pos.x);
      const lx = x + Math.cos(angle) * (r + 8);
      const ly = y + Math.sin(angle) * (r + 3);
      const anchor = Math.abs(angle) > Math.PI/2 ? "end" : "start";
      const fs = ring === 0 ? 13*zoom : (ring <= 2 ? 10.5*zoom : 9*zoom);
      html += `<text x="${lx}" y="${ly}" fill="${col.dim}" font-family="'Crimson Pro',serif" font-size="${fs}" text-anchor="${anchor}" dominant-baseline="middle" opacity="${nodeOp > 0.5 ? 0.9 : nodeOp}">${c.name}</text>`;
    }
    html += '</g>';
  });

  svg.innerHTML = html;

  // Attach events
  svg.querySelectorAll('.node').forEach(g => {
    const id = g.dataset.id;
    g.addEventListener('mouseenter', e => showTooltip(e, id));
    g.addEventListener('mousemove', e => moveTooltip(e));
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('click', e => { e.stopPropagation(); selectConcept(id); });
    // Touch
    g.addEventListener('touchend', e => { e.preventDefault(); selectConcept(id); });
  });

  updateStats();
}

function showTooltip(e, id) {
  const c = cMap[id]; if (!c) return;
  tooltip.querySelector('.tt-name').textContent = c.name;
  tooltip.querySelector('.tt-def').textContent = c.def;
  tooltip.classList.add('visible');
  moveTooltip(e);
  // Scale node
  const g = svg.querySelector(`.node[data-id="${id}"]`);
  if (g) g.style.transform = `scale(1.3)`;
}
function moveTooltip(e) {
  const x = (e.touches ? e.touches[0].clientX : e.clientX) + 14;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) + 14;
  tooltip.style.left = Math.min(x, window.innerWidth - 300) + 'px';
  tooltip.style.top = Math.min(y, window.innerHeight - 80) + 'px';
}
function hideTooltip() {
  tooltip.classList.remove('visible');
  svg.querySelectorAll('.node').forEach(g => g.style.transform = '');
}

function selectConcept(id) {
  selected = selected === id ? null : id;
  render();
  if (selected) openPanel(id); else closePanel();
}

function openPanel(id) {
  const c = cMap[id]; if (!c) return;
  const fam = familyOf(c);
  const col = familyColor(fam);
  const ring = ringOf(c);
  const mat = c.maturity;

  let h = `<div class="card-title" style="color:${col.bright}">${c.name}</div>`;
  if (c.alt) h += `<div class="card-alt">${c.alt}</div>`;

  // Badges
  h += '<div class="card-badges">';
  h += `<span class="badge badge-ring">Ring ${ring}: ${RING_LABELS[ring]||''}</span>`;
  h += `<span class="badge badge-family" style="border-color:${col.mid};color:${col.mid}">${fam}</span>`;
  h += `<span class="badge badge-maturity badge-mat-${mat}">${mat}</span>`;
  if (c.type) h += `<span class="badge badge-type">${c.type}</span>`;
  // Author badges
  const authors = (c.author||"").split(/[\/,]/).map(a=>a.trim()).filter(Boolean);
  authors.forEach(a => {
    const al = a.toLowerCase();
    let cls = 'badge-author-collab';
    if (al.includes('zm')) cls = 'badge-author-zm';
    else if (al.includes('rs')) cls = 'badge-author-rs';
    else if (al.includes('gg')) cls = 'badge-author-gg';
    h += `<span class="badge badge-author ${cls}">${a.replace('collaborative','C').substring(0,2).toUpperCase()}</span>`;
  });
  h += '</div>';

  h += `<div class="card-def">${c.def}</div>`;

  // Presupposes
  if (c.presupposes && c.presupposes.length) {
    h += '<div class="card-fields"><div class="card-label">Presupposes</div><div class="card-value">';
    c.presupposes.forEach(pid => {
      const pc = cMap[pid];
      const name = pc ? pc.name : pid;
      h += `<span class="pill" onclick="selectConcept('${pid}')">${name}</span>`;
    });
    h += '</div></div>';
  }

  // Dependents
  const deps = CONCEPTS.filter(d => (d.presupposes||[]).includes(id));
  if (deps.length) {
    h += '<div class="card-fields"><div class="card-label">Dependents</div><div class="card-value">';
    deps.forEach(d => { h += `<span class="pill" onclick="selectConcept('${d.id}')">${d.name}</span>`; });
    h += '</div></div>';
  }

  // Belongings
  if (c.belongings && c.belongings.length) {
    h += '<div class="card-fields"><div class="card-label">Belongings</div><div class="card-value"><ul class="belongings-list">';
    c.belongings.forEach(b => {
      const parts = b.split('(');
      if (parts.length > 1) h += `<li>${parts[0]}<span class="bq">(${parts.slice(1).join('(')}</span></li>`;
      else h += `<li>${b}</li>`;
    });
    h += '</ul></div></div>';
  }

  // HAAK counterpart
  if (c.haak) {
    h += `<div class="haak-callout"><div class="card-label">HAAK counterpart</div><div class="card-value">${c.haak}</div></div>`;
  }

  // Source
  if (c.source) h += `<div class="card-fields"><div class="card-label">Source</div><div class="card-value">${c.source}</div></div>`;

  panelContent.innerHTML = h;
  panel.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
  selected = null;
  render();
}

document.getElementById('panel-close').onclick = closePanel;
svg.addEventListener('click', e => { if (e.target === svg || e.target.tagName === 'rect') { selected = null; render(); closePanel(); } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closePanel(); } });

// Zoom + pan
let dragging = false, dragX = 0, dragY = 0;
wrap.addEventListener('mousedown', e => { if (e.target.closest('.node')) return; dragging = true; dragX = e.clientX; dragY = e.clientY; });
window.addEventListener('mousemove', e => { if (!dragging) return; panX += (e.clientX - dragX) / zoom; panY += (e.clientY - dragY) / zoom; dragX = e.clientX; dragY = e.clientY; render(); });
window.addEventListener('mouseup', () => { dragging = false; });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left - cx, my = e.clientY - rect.top - cy;
  const oldZ = zoom;
  zoom *= e.deltaY < 0 ? 1.08 : 0.926;
  zoom = Math.max(0.3, Math.min(5, zoom));
  panX += mx * (1/oldZ - 1/zoom);
  panY += my * (1/oldZ - 1/zoom);
  render();
}, {passive: false});

// Touch zoom/pan
let touches0 = null, touchDist0 = 0, touchPan0 = null;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchDist0 = Math.sqrt(dx*dx+dy*dy);
    touches0 = {zoom, panX, panY};
  } else if (e.touches.length === 1) {
    touchPan0 = {x: e.touches[0].clientX, y: e.touches[0].clientY, px: panX, py: panY};
  }
});
wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && touches0) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.sqrt(dx*dx+dy*dy);
    zoom = Math.max(0.3, Math.min(5, touches0.zoom * d / touchDist0));
    render();
  } else if (e.touches.length === 1 && touchPan0) {
    panX = touchPan0.px + (e.touches[0].clientX - touchPan0.x) / zoom;
    panY = touchPan0.py + (e.touches[0].clientY - touchPan0.y) / zoom;
    render();
  }
}, {passive: false});
wrap.addEventListener('touchend', () => { touches0 = null; touchPan0 = null; });

// Search
searchInput.addEventListener('input', () => { searchTerm = searchInput.value; render(); });

// Filters
['filter-ring','filter-family','filter-maturity','filter-author'].forEach(id => {
  document.getElementById(id).addEventListener('change', e => {
    const key = id.replace('filter-','');
    filters[key] = e.target.value;
    updateFilterPills();
    render();
  });
});

document.getElementById('filters-toggle').onclick = () => {
  document.getElementById('filters-panel').classList.toggle('open');
};

function updateFilterPills() {
  const el = document.getElementById('active-filters');
  let h = '';
  Object.entries(filters).forEach(([k,v]) => {
    if (v) h += `<span class="filter-pill" onclick="clearFilter('${k}')">${k}: ${v} <span class="x">&times;</span></span>`;
  });
  el.innerHTML = h;
}

function clearFilter(key) {
  filters[key] = '';
  document.getElementById('filter-'+key).value = '';
  updateFilterPills();
  render();
}
window.clearFilter = clearFilter;
window.selectConcept = selectConcept;

function updateStats() {
  const vis = CONCEPTS.filter(isVisible).length;
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `<span>${vis} concepts</span>` +
    `<span><span class="stat-dot" style="background:#dbb545"></span>Thing</span>` +
    `<span><span class="stat-dot" style="background:#4a9eff"></span>Relation</span>` +
    `<span><span class="stat-dot" style="background:#3ecf8e"></span>Situation</span>` +
    `<span><span class="stat-dot" style="background:#c8c8c8"></span>Bridge</span>` +
    `<span>8 rings</span>`;
}

// Genealogy
function renderGenealogy() {
  const grid = document.getElementById('genealogy-grid');
  // Thinker -> pillar influence mapping
  const thinkerPillars = {
    "Parmenides": ["thing"], "Nicholas": ["situation","relation"], "Immanuel Kant": ["situation","bridge"],
    "G.W.F. Hegel": ["relation","situation"], "Edmund Husserl": ["situation"], "Martin Heidegger": ["situation","thing"],
    "Jacques Derrida": ["relation"], "Gilles Deleuze": ["relation","situation"], "Alain Badiou": ["situation"],
    "Jean-Luc Nancy": ["thing","relation"], "Graham Harman": ["thing"], "Bruno Latour": ["relation","thing"],
    "Heinrich Rombach": ["situation"], "Donna Haraway": ["relation","thing"], "Emilio Uranga": ["situation"],
    "Giorgio Agamben": ["situation"]
  };

  grid.innerHTML = GENEALOGY.map(g => {
    let dots = '';
    const key = Object.keys(thinkerPillars).find(k => g.name.includes(k));
    const pillars = key ? thinkerPillars[key] : ["bridge"];
    pillars.forEach(p => {
      const col = FAMILY_COLORS[p] ? FAMILY_COLORS[p].bright : '#888';
      dots += `<span class="gen-pillar-dot" style="background:${col}"></span>`;
    });
    return `<div class="gen-card">
      <div class="gen-name">${g.name}</div>
      <div class="gen-body">${g.body}
        ${g.takes ? `<br><span class="gen-takes">Takes: ${g.takes}</span>` : ''}
        ${g.rejects ? `<br><span class="gen-rejects">Rejects: ${g.rejects}</span>` : ''}
      </div>
      <div class="gen-pillar-dots">${dots}</div>
    </div>`;
  }).join('');
}

// Init
window.addEventListener('resize', resize);
renderGenealogy();
resize();
</script>
